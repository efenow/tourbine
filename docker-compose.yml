services:
  tourbine:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Persist database and uploaded images across container restarts
      - tourbine_data:/app/data
      - tourbine_uploads:/app/public/uploads
    environment:
      NODE_ENV: production
      PORT: 3000

volumes:
  tourbine_data:
  tourbine_uploads:
